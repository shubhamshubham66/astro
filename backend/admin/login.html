<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | AstroTantraHawan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-container{
  background:#fff;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  width:100%;
  max-width:440px;
  padding:48px 40px;
}
.logo{
  text-align:center;
  margin-bottom:32px;
}
.logo-text{
  font-size:28px;
  font-weight:700;
  color:#0F172A;
}
.logo-text span{color:#C9922B;}
.logo-subtitle{
  font-size:14px;
  color:#64748B;
  margin-top:8px;
}
.form-group{
  margin-bottom:20px;
}
.form-label{
  display:block;
  font-size:14px;
  font-weight:600;
  color:#0F172A;
  margin-bottom:8px;
}
.form-input{
  width:100%;
  padding:14px 16px;
  border:1px solid #E2E8F0;
  border-radius:8px;
  font-size:15px;
  transition:.2s;
}
.form-input:focus{
  outline:none;
  border-color:#C9922B;
  box-shadow:0 0 0 3px rgba(201,146,43,.1);
}
.btn-login{
  width:100%;
  padding:14px;
  background:#C9922B;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  margin-top:24px;
}
.btn-login:hover{
  background:#B8821F;
}
.divider{
  text-align:center;
  margin:24px 0;
  color:#94A3B8;
  font-size:13px;
}
.security-note{
  text-align:center;
  font-size:12px;
  color:#64748B;
  margin-top:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.checkbox-group{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:16px;
}
.checkbox-group input{
  width:18px;
  height:18px;
  cursor:pointer;
}
.checkbox-group label{
  font-size:14px;
  color:#475569;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-text">AstroTantra<span>Hawan</span></div>
    <div class="logo-subtitle">Secure Admin Access</div>
  </div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="admin@astrotantrahawan.com" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" placeholder="Enter your password" required>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="remember">
      <label for="remember">Remember me for 30 days</label>
    </div>

    <button type="submit" class="btn-login">Sign In to Dashboard</button>
  </form>

  <div class="divider">━━━━━━━━━━━━━━━━━</div>

  <div class="security-note">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    Protected by 2FA & OTP Verification
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  // Simulate login (replace with actual authentication)
  alert('Login functionality will be connected to backend authentication system.\n\nFor demo: Redirecting to dashboard...');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
