<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AstroTantraHawan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-container{
  background:#fff;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  width:100%;
  max-width:440px;
  padding:48px 40px;
}
.logo{
  text-align:center;
  margin-bottom:32px;
}
.logo-text{
  font-size:28px;
  font-weight:700;
  color:#0F172A;
}
.logo-text span{color:#C9922B;}
.logo-subtitle{
  font-size:14px;
  color:#64748B;
  margin-top:8px;
}

/* DEMO CREDENTIALS BOX */
.demo-box{
  background:#FEF3C7;
  border:1px solid #F59E0B;
  border-radius:8px;
  padding:12px 16px;
  margin-bottom:24px;
  font-size:12px;
}
.demo-box strong{
  color:#F59E0B;
  display:block;
  margin-bottom:8px;
  font-size:13px;
}
.demo-box div{
  margin:4px 0;
  color:#92400E;
  font-family:monospace;
}

/* USER TYPE TOGGLE */
.user-type-toggle{
  display:flex;
  gap:12px;
  margin-bottom:28px;
  padding:4px;
  background:#F1F5F9;
  border-radius:10px;
}
.user-type-btn{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  color:#64748B;
  cursor:pointer;
  transition:.2s;
}
.user-type-btn.active{
  background:#fff;
  color:#0F172A;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

/* LOGIN METHOD TABS */
.login-tabs{
  display:flex;
  gap:8px;
  margin-bottom:24px;
  border-bottom:2px solid #E2E8F0;
}
.tab-btn{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  font-size:14px;
  font-weight:600;
  color:#64748B;
  cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  transition:.2s;
}
.tab-btn.active{
  color:#C9922B;
  border-bottom-color:#C9922B;
}

/* FORM */
.form-group{
  margin-bottom:20px;
}
.form-label{
  display:block;
  font-size:14px;
  font-weight:600;
  color:#0F172A;
  margin-bottom:8px;
}
.form-input{
  width:100%;
  padding:14px 16px;
  border:1px solid #E2E8F0;
  border-radius:8px;
  font-size:15px;
  transition:.2s;
}
.form-input:focus{
  outline:none;
  border-color:#C9922B;
  box-shadow:0 0 0 3px rgba(201,146,43,.1);
}
.phone-input-group{
  display:flex;
  gap:8px;
}
.country-code{
  width:80px;
  padding:14px 12px;
  border:1px solid #E2E8F0;
  border-radius:8px;
  font-size:15px;
  font-weight:600;
}
.btn-primary{
  width:100%;
  padding:14px;
  background:#C9922B;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  margin-top:24px;
}
.btn-primary:hover{
  background:#B8821F;
}
.btn-google{
  width:100%;
  padding:14px;
  background:#fff;
  color:#0F172A;
  border:1px solid #E2E8F0;
  border-radius:8px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.btn-google:hover{
  background:#F8FAFC;
  border-color:#C9922B;
}
.divider{
  text-align:center;
  margin:24px 0;
  color:#94A3B8;
  font-size:13px;
  position:relative;
}
.divider::before,
.divider::after{
  content:'';
  position:absolute;
  top:50%;
  width:40%;
  height:1px;
  background:#E2E8F0;
}
.divider::before{left:0;}
.divider::after{right:0;}
.security-note{
  text-align:center;
  font-size:12px;
  color:#64748B;
  margin-top:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.tab-content{
  display:none;
}
.tab-content.active{
  display:block;
}
.otp-note{
  font-size:13px;
  color:#64748B;
  margin-top:8px;
  display:flex;
  align-items:center;
  gap:6px;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-text">AstroTantra<span>Hawan</span></div>
    <div class="logo-subtitle">Secure Login</div>
  </div>

  <!-- USER TYPE TOGGLE -->
  <div class="user-type-toggle">
    <button class="user-type-btn active" onclick="switchUserType('user')">
      👤 User Login
    </button>
    <button class="user-type-btn" onclick="switchUserType('admin')">
      🔐 Admin Login
    </button>
  </div>

  <!-- DEMO CREDENTIALS -->
  <div class="demo-box" id="demoBox">
    <strong>🔑 Demo User Credentials:</strong>
    <div>📱 Mobile: +91 9876543210 | OTP: 123456</div>
    <div>📧 Email: user@demo.com | Password: user123</div>
  </div>

  <!-- LOGIN METHOD TABS -->
  <div class="login-tabs">
    <button class="tab-btn active" onclick="switchTab('mobile')">📱 Mobile</button>
    <button class="tab-btn" onclick="switchTab('gmail')">📧 Gmail</button>
  </div>

  <!-- MOBILE LOGIN -->
  <div id="mobile-tab" class="tab-content active">
    <form onsubmit="handleMobileLogin(event)">
      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <div class="phone-input-group">
          <select class="country-code">
            <option value="+91">🇮🇳 +91</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
          </select>
          <input type="tel" class="form-input" id="mobileInput" placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}" required>
        </div>
        <div class="otp-note">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          OTP will be sent to this number
        </div>
      </div>

      <div class="form-group" id="otpGroup" style="display:none;">
        <label class="form-label">Enter OTP</label>
        <input type="text" class="form-input" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6">
      </div>

      <button type="submit" class="btn-primary" id="mobileBtn">Send OTP</button>
    </form>
  </div>

  <!-- GMAIL LOGIN -->
  <div id="gmail-tab" class="tab-content">
    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">OR</div>

    <form onsubmit="handleEmailLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="emailInput" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="passwordInput" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>
  </div>

  <div class="security-note">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    <span id="security-text">Protected by OTP Verification</span>
  </div>
</div>

<script>
let currentUserType = 'user';
let otpSent = false;

// Demo credentials
const DEMO_CREDS = {
  user: {
    mobile: '9876543210',
    otp: '123456',
    email: 'user@demo.com',
    password: 'user123'
  },
  admin: {
    mobile: '9999999999',
    otp: '999999',
    email: 'admin@astrotantrahawan.com',
    password: 'admin@2025'
  }
};

function switchUserType(type) {
  currentUserType = type;
  
  // Update button states
  document.querySelectorAll('.user-type-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  // Update demo credentials box
  const demoBox = document.getElementById('demoBox');
  if(type === 'admin') {
    demoBox.innerHTML = `
      <strong>🔑 Demo Admin Credentials:</strong>
      <div>📱 Mobile: +91 9999999999 | OTP: 999999</div>
      <div>📧 Email: admin@astrotantrahawan.com | Password: admin@2025</div>
    `;
  } else {
    demoBox.innerHTML = `
      <strong>🔑 Demo User Credentials:</strong>
      <div>📱 Mobile: +91 9876543210 | OTP: 123456</div>
      <div>📧 Email: user@demo.com | Password: user123</div>
    `;
  }
  
  // Update security text
  const securityText = document.getElementById('security-text');
  if(type === 'admin') {
    securityText.textContent = 'Admin Access with 2FA Security';
  } else {
    securityText.textContent = 'Protected by OTP Verification';
  }
  
  // Reset OTP state
  otpSent = false;
  document.getElementById('otpGroup').style.display = 'none';
  document.getElementById('mobileBtn').textContent = 'Send OTP';
}

function switchTab(tab) {
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  // Update tab content
  document.querySelectorAll('.tab-content').forEach(content => {
    content.classList.remove('active');
  });
  document.getElementById(`${tab}-tab`).classList.add('active');
}

function handleMobileLogin(e) {
  e.preventDefault();
  const mobile = document.getElementById('mobileInput').value;
  const countryCode = document.querySelector('.country-code').value;
  const creds = DEMO_CREDS[currentUserType];
  
  if(!otpSent) {
    // Send OTP
    if(mobile === creds.mobile) {
      alert(`✅ OTP Sent to ${countryCode} ${mobile}\n\n🔑 Your OTP: ${creds.otp}\n\nEnter OTP to proceed`);
      otpSent = true;
      document.getElementById('otpGroup').style.display = 'block';
      document.getElementById('mobileBtn').textContent = 'Verify OTP & Login';
    } else {
      alert('❌ Mobile number not registered!\n\nUse demo credentials shown above.');
    }
  } else {
    // Verify OTP
    const otp = document.getElementById('otpInput').value;
    if(otp === creds.otp) {
      alert(`✅ OTP Verified Successfully!\n\nWelcome ${currentUserType.toUpperCase()}!`);
      redirectUser();
    } else {
      alert('❌ Invalid OTP!\n\nCorrect OTP: ' + creds.otp);
    }
  }
}

function handleGoogleLogin() {
  alert(`✅ Google Login Successful!\n\nUser Type: ${currentUserType.toUpperCase()}\n\n(Google OAuth integration ready)`);
  redirectUser();
}

function handleEmailLogin(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;
  const creds = DEMO_CREDS[currentUserType];
  
  if(email === creds.email && password === creds.password) {
    alert(`✅ Login Successful!\n\nWelcome ${currentUserType.toUpperCase()}!`);
    redirectUser();
  } else {
    alert(`❌ Invalid Credentials!\n\nUse demo credentials:\nEmail: ${creds.email}\nPassword: ${creds.password}`);
  }
}

function redirectUser() {
  if(currentUserType === 'admin') {
    window.location.href = 'index.html';
  } else {
    window.location.href = '../../index.html';
  }
}
</script>

</body>
</html>
